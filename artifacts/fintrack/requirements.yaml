packages:
  "recharts": "Dashboard analytics charts and data visualization"
  "zustand": "State management for filters and chat history"
  "date-fns": "Human-readable date formatting and manipulation"
  "framer-motion": "Page transitions and scroll-triggered animations"
  "@hookform/resolvers": "Zod validation with react-hook-form"
  "react-hook-form": "Form state management"
  "zod": "Schema validation"
  "clsx": "Utility for constructing className strings conditionally"
