kind = "web"
previewPath = "/"
title = "FinTrack AI"
version = "1.0.0"
id = "artifacts/fintrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23162
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/fintrack run dev"

[services.env]
PORT = "23162"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/fintrack", "run", "build"]
publicDir = "artifacts/fintrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
