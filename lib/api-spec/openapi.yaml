openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FinTrack AI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: expenses
    description: Expense management
  - name: investment
    description: Investment advisor
  - name: chat
    description: AI chat assistant

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current authenticated user
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  /login:
    get:
      operationId: beginBrowserLogin
      tags: [auth]
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to OIDC authorization endpoint.

  /callback:
    get:
      operationId: handleBrowserLoginCallback
      tags: [auth]
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to returnTo path on success.

  /logout:
    get:
      operationId: logoutBrowserSession
      tags: [auth]
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "302":
          description: Redirect to OIDC logout URL.

  /mobile-auth/token-exchange:
    post:
      operationId: exchangeMobileAuthorizationCode
      tags: [auth]
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeBody"
      responses:
        "200":
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mobile-auth/logout:
    post:
      operationId: logoutMobileSession
      tags: [auth]
      summary: Delete a mobile session token
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
      responses:
        "200":
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutMobileSessionResponse"

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List all expenses for current user
      parameters:
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create a new expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "201":
          description: Expense created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /expenses/{id}:
    get:
      operationId: getExpense
      tags: [expenses]
      summary: Get expense by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expense found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExpenseBody"
      responses:
        "200":
          description: Expense updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expense deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /expenses/summary/monthly:
    get:
      operationId: getMonthlySummary
      tags: [expenses]
      summary: Get monthly expense summary and breakdown by category
      parameters:
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Monthly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlySummaryResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /investment/advice:
    post:
      operationId: getInvestmentAdvice
      tags: [investment]
      summary: Get investment recommendations based on financial profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestmentAdviceBody"
      responses:
        "200":
          description: Investment recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestmentAdviceResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallets:
    get:
      operationId: getLinkedWallets
      tags: [wallets]
      summary: Get all linked wallets for current user
      responses:
        "200":
          description: List of linked wallets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallets/link:
    post:
      operationId: linkWallet
      tags: [wallets]
      summary: Link a wallet or trading account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkWalletBody"
      responses:
        "200":
          description: Wallet linked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallets/{id}/unlink:
    delete:
      operationId: unlinkWallet
      tags: [wallets]
      summary: Unlink a wallet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Wallet unlinked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallets/{id}/portfolio:
    get:
      operationId: getWalletPortfolio
      tags: [wallets]
      summary: Get mock portfolio data for a linked wallet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Portfolio data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletPortfolioResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat/message:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the AI financial assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageBody"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GetCurrentAuthUserResponse:
      type: object
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/UserInfo"
            - type: "null"
      required:
        - user

    UserInfo:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        profileImage:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
      required:
        - id

    Expense:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        title:
          type: string
        amount:
          type: number
        category:
          type: string
        date:
          type: string
        notes:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - title
        - amount
        - category
        - date
        - createdAt

    CreateExpenseBody:
      type: object
      properties:
        title:
          type: string
        amount:
          type: number
        category:
          type: string
        date:
          type: string
        notes:
          type: string
      required:
        - title
        - amount
        - category
        - date

    UpdateExpenseBody:
      type: object
      properties:
        title:
          type: string
        amount:
          type: number
        category:
          type: string
        date:
          type: string
        notes:
          type: string

    ExpenseResponse:
      type: object
      properties:
        expense:
          $ref: "#/components/schemas/Expense"
      required:
        - expense

    ExpenseListResponse:
      type: object
      properties:
        expenses:
          type: array
          items:
            $ref: "#/components/schemas/Expense"
        total:
          type: number
        count:
          type: integer
      required:
        - expenses
        - total
        - count

    CategoryBreakdown:
      type: object
      properties:
        category:
          type: string
        total:
          type: number
        count:
          type: integer
        percentage:
          type: number
      required:
        - category
        - total
        - count
        - percentage

    DailyTotal:
      type: object
      properties:
        date:
          type: string
        total:
          type: number
      required:
        - date
        - total

    MonthlySummaryResponse:
      type: object
      properties:
        month:
          type: integer
        year:
          type: integer
        totalSpent:
          type: number
        categoryBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/CategoryBreakdown"
        dailyTotals:
          type: array
          items:
            $ref: "#/components/schemas/DailyTotal"
        expenseCount:
          type: integer
        previousMonthTotal:
          type: number
      required:
        - month
        - year
        - totalSpent
        - categoryBreakdown
        - dailyTotals
        - expenseCount
        - previousMonthTotal

    InvestmentRecommendation:
      type: object
      properties:
        category:
          type: string
        percentage:
          type: number
        amount:
          type: number
        description:
          type: string
        riskLevel:
          type: string
      required:
        - category
        - percentage
        - amount
        - description
        - riskLevel

    InvestmentAdviceBody:
      type: object
      properties:
        monthlyIncome:
          type: number
        monthlySavings:
          type: number
        riskTolerance:
          type: string
        investmentGoal:
          type: string
        age:
          type: integer
      required:
        - monthlyIncome
        - monthlySavings

    InvestmentAdviceResponse:
      type: object
      properties:
        totalInvestable:
          type: number
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/InvestmentRecommendation"
        summary:
          type: string
        emergencyFundAdvice:
          type: string
        savingsRate:
          type: number
      required:
        - totalInvestable
        - recommendations
        - summary
        - emergencyFundAdvice
        - savingsRate

    ChatMessage:
      type: object
      properties:
        role:
          type: string
        content:
          type: string
      required:
        - role
        - content

    ChatMessageBody:
      type: object
      properties:
        message:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - message

    ChatMessageResponse:
      type: object
      properties:
        reply:
          type: string
        suggestions:
          type: array
          items:
            type: string
      required:
        - reply

    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    LinkedWallet:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        provider:
          type: string
        label:
          type: string
        maskedKey:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - userId
        - provider
        - label
        - status
        - createdAt

    LinkWalletBody:
      type: object
      properties:
        provider:
          type: string
        label:
          type: string
        apiKey:
          type: string
        secretKey:
          type: string
      required:
        - provider
        - label

    WalletResponse:
      type: object
      properties:
        wallet:
          $ref: "#/components/schemas/LinkedWallet"
      required:
        - wallet

    WalletListResponse:
      type: object
      properties:
        wallets:
          type: array
          items:
            $ref: "#/components/schemas/LinkedWallet"
      required:
        - wallets

    PortfolioHolding:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        quantity:
          type: number
        currentPrice:
          type: number
        currentValue:
          type: number
        gainLoss:
          type: number
        gainLossPercent:
          type: number
        type:
          type: string
      required:
        - symbol
        - name
        - quantity
        - currentPrice
        - currentValue
        - gainLoss
        - gainLossPercent
        - type

    WalletPortfolioResponse:
      type: object
      properties:
        provider:
          type: string
        totalValue:
          type: number
        totalInvested:
          type: number
        totalGainLoss:
          type: number
        totalGainLossPercent:
          type: number
        holdings:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioHolding"
        lastUpdated:
          type: string
        isSimulated:
          type: boolean
      required:
        - provider
        - totalValue
        - totalInvested
        - totalGainLoss
        - totalGainLossPercent
        - holdings
        - lastUpdated
        - isSimulated

    ExchangeMobileAuthorizationCodeBody:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    ExchangeMobileAuthorizationCodeResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutMobileSessionResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
      required:
        - error
